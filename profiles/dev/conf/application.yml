server:
  servlet:
    context-path: /prodhub
  port: 8081
  shutdown: graceful  

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
    enabled: true

spring:
  data:
    mongodb:
      host: 35.209.84.86
      port: 27017
      database: prodhub
      pool:
        max-wait-queue-size: 1000
        min-size: 5
        max-size: 20
        max-life-time: 1000
        max-wait-time: 30
        maintenance-initial-delay: 1000
        maintenance-frequency: 1000
        max-connection-idle-time: 5
  kafka:
    bootstrap-servers: 35.209.84.86:9092
    topic:
      buildStatus: buildStatus
      deploymentConfigAndSubmit: deployment-config-and-submit
      deploymentUpdates: deployment-update
      ephemeralEnvironmentUpdate: ephemeral-environment-update
      pipeline-execution: pipeline-execution
      pipeline-execution-update: pipeline-execution-update

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always

vault:
  uri: http://35.209.84.86:8200
  token: hvs.kuonI3JQThkmxiaySCBuPwrT

cicaptain:
  uri: http://cicaptain-app:4457/ci-captain
  triggerBuildPath: /api/v1/pipeline-executions/trigger
  buildStatus: /api/v1/providers/%s/job/%s/status

deplorch:
  uri: http://cloudedgedeployer-app:4458/cloudedge-deployer
  initiateDeployment: /api/v1/deployment/start
  initiatePipelineDeployment: /api/v1/pipeline/start
